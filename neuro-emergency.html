<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Clinical Procedures | Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:#f1f5f9;color:#1e293b;line-height:1.6;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
button,input{font-family:inherit;-webkit-appearance:none;appearance:none;}
button{cursor:pointer;border:none;background:none;color:inherit;}
ul{list-style:none;}
strong{font-weight:600;}
:root{
  --topbar-h:58px;--sidebar-w:280px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --tr:0.22s cubic-bezier(0.16,1,0.3,1);
}
/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:calc(var(--topbar-h) + var(--safe-top));
  padding-top:var(--safe-top);
  background:rgba(10,17,35,0.97);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;gap:10px;
  padding-left:max(14px,var(--safe-left));
  padding-right:max(14px,var(--safe-right));
}
.t-logo{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#3b82f6,#a855f7);
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;flex-shrink:0;
}
.t-title{
  font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:700;
  color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#menuBtn{
  width:38px;height:38px;border-radius:var(--radius-xs);
  background:rgba(255,255,255,0.1);color:#fff;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.t-progress{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.t-prog-txt{font-size:0.68rem;color:rgba(255,255,255,0.55);white-space:nowrap;}
.t-prog-bg{width:56px;height:5px;background:rgba(255,255,255,0.12);border-radius:99px;overflow:hidden;}
.t-prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#a855f7);border-radius:99px;width:0%;transition:width 0.5s ease;}
#spacer{height:calc(var(--topbar-h) + var(--safe-top));}
/* OVERLAY */
#overlay{
  display:none;position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;transition:opacity 0.3s ease;
}
#overlay.show{display:block;}
#overlay.visible{opacity:1;}
/* SIDEBAR */
#sidebar{
  position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:700;
  background:linear-gradient(180deg,#0f172a 0%,#1a2744 100%);
  color:#f1f5f9;display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform var(--tr);overflow:hidden;
}
#sidebar.open{transform:translateX(0);}
.s-head{
  padding:calc(14px + var(--safe-top)) 14px 12px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.s-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.s-logo-icon{
  width:36px;height:36px;border-radius:9px;
  background:linear-gradient(135deg,#3b82f6,#a855f7);
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;
}
.s-logo-txt{flex:1;}
.s-logo-txt strong{display:block;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:700;}
.s-logo-txt span{font-size:0.62rem;color:rgba(255,255,255,0.4);}
#closeBtn{
  width:32px;height:32px;border-radius:99px;
  background:rgba(255,255,255,0.1);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.s-search-wrap{position:relative;}
.s-search-wrap input{
  width:100%;padding:8px 12px 8px 34px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:99px;color:#fff;font-size:0.8rem;outline:none;
  transition:background 0.2s,border-color 0.2s;
}
.s-search-wrap input::placeholder{color:rgba(255,255,255,0.38);}
.s-search-wrap input:focus{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.28);}
.s-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.4;font-size:0.8rem;pointer-events:none;}
.s-list-wrap{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
  padding:6px 0 calc(20px + var(--safe-bottom));
}
.s-list-wrap::-webkit-scrollbar{width:3px;}
.s-list-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:99px;}
.s-item{
  width:100%;text-align:left;padding:10px 14px;background:transparent;
  color:rgba(255,255,255,0.68);font-size:0.8rem;
  display:flex;align-items:center;gap:10px;border-left:3px solid transparent;
  transition:background 0.15s,color 0.15s,border-color 0.15s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.s-item:active{background:rgba(255,255,255,0.07);color:#fff;}
.s-item.active{background:rgba(59,130,246,0.18);color:#fff;border-left-color:#3b82f6;font-weight:600;}
.s-item .s-num{
  width:27px;height:27px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.62rem;font-weight:700;color:#fff;flex-shrink:0;
  background:rgba(255,255,255,0.1);
}
.s-item.active .s-num{background:linear-gradient(135deg,#3b82f6,#a855f7);}
.s-item .s-ttl{flex:1;line-height:1.3;}
.s-item .s-pg{font-size:0.58rem;color:rgba(255,255,255,0.28);flex-shrink:0;}
/* PAGE CONTENT */
#pageContent{
  width:100%;
  padding:16px 14px calc(80px + var(--safe-bottom)) 14px;
  padding-left:max(14px,var(--safe-left));
  padding-right:max(14px,var(--safe-right));
  max-width:940px;margin:0 auto;
}
/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat-card{
  background:#fff;border-radius:var(--radius);padding:14px 8px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 14px rgba(0,0,0,0.04);
  display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;
}
.stat-card .s-icon{font-size:1.35rem;}
.stat-card .s-val{font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;color:#1e293b;}
.stat-card .s-lbl{font-size:0.62rem;color:#64748b;font-weight:500;}
/* CHAPTER CARDS */
.ch-card{
  background:#fff;border-radius:var(--radius);margin-bottom:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06),0 6px 20px rgba(0,0,0,0.04);
  overflow:hidden;animation:fadeUp 0.35s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ch-head{
  padding:16px 16px 13px;display:flex;align-items:center;gap:12px;
  color:#fff;position:relative;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.ch-head::after{
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:1px;background:rgba(255,255,255,0.14);
}
.ch-icon{
  width:46px;height:46px;border-radius:11px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;flex-shrink:0;
}
.ch-meta{flex:1;min-width:0;}
.ch-ttl{font-family:'Outfit',sans-serif;font-size:0.97rem;font-weight:700;line-height:1.2;margin-bottom:5px;}
.ch-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ch-tag{background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:99px;font-size:0.6rem;font-weight:600;}
.ch-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ch-done-btn{
  width:33px;height:33px;border-radius:99px;
  background:rgba(255,255,255,0.18);color:#fff;font-size:0.95rem;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.18s,transform 0.18s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0;
}
.ch-done-btn:active{transform:scale(0.9);}
.ch-done-btn.marked{background:rgba(255,255,255,0.9);color:#1e293b;}
.ch-arrow{font-size:0.75rem;opacity:0.75;transition:transform var(--tr);flex-shrink:0;}
.ch-arrow.open{transform:rotate(180deg);}
.ch-body{max-height:0;overflow:hidden;transition:max-height 0.42s cubic-bezier(0.16,1,0.3,1);}
.ch-body.open{max-height:3000px;}
.ch-body-inner{padding:14px 16px 16px;}
/* INFO CARDS */
.info-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));
  gap:10px;margin-bottom:10px;
}
.info-card{border-radius:var(--radius-sm);padding:13px;border:1.5px solid transparent;}
.info-card h4{font-family:'Outfit',sans-serif;font-size:0.86rem;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.info-card p{font-size:0.83rem;line-height:1.6;}
.blue-card{background:#eff6ff;border-color:rgba(59,130,246,0.22);color:#1e3a5f;}
.blue-card h4{color:#1d4ed8;}
.red-card{background:#fff1f1;border-color:rgba(239,68,68,0.22);color:#450a0a;}
.red-card h4{color:#b91c1c;}
.green-card{background:#f0fdf4;border-color:rgba(34,197,94,0.22);color:#052e16;}
.green-card h4{color:#15803d;}
.orange-card{background:#fff7ed;border-color:rgba(249,115,22,0.22);color:#431407;}
.orange-card h4{color:#c2410c;}
.purple-card{background:#faf5ff;border-color:rgba(168,85,247,0.22);color:#3b0764;}
.purple-card h4{color:#7e22ce;}
.teal-card{background:#f0fdfa;border-color:rgba(20,184,166,0.22);color:#042f2e;}
.teal-card h4{color:#0f766e;}
.dot-list{padding-left:17px;}
.dot-list li{font-size:0.83rem;padding:2px 0;list-style:disc;}
.checklist{padding-left:0;}
.checklist li{font-size:0.83rem;padding:5px 0 5px 22px;position:relative;border-bottom:1px solid rgba(0,0,0,0.04);}
.checklist li:last-child{border-bottom:none;}
.checklist li::before{content:"✓";position:absolute;left:0;font-weight:700;font-size:0.75rem;opacity:0.6;}
ol{padding-left:17px;}
ol li{font-size:0.83rem;padding:2px 0;}
.danger-box{
  background:#fff1f1;border:2px solid rgba(239,68,68,0.28);
  border-radius:var(--radius-sm);padding:11px 13px;
  font-size:0.83rem;color:#7f1d1d;font-weight:500;
  margin-top:10px;display:flex;align-items:flex-start;gap:8px;
}
.danger-box::before{content:"🚨";flex-shrink:0;}
.pearl-box{
  background:#fffbeb;border:2px solid rgba(234,179,8,0.28);
  border-radius:var(--radius-sm);padding:11px 13px;
  font-size:0.83rem;color:#713f12;font-weight:500;
  margin-top:10px;display:flex;align-items:flex-start;gap:8px;
}
.pearl-box::before{content:"💡";flex-shrink:0;}
/* SCROLL TOP */
#scrollTopBtn{
  position:fixed;right:max(16px,var(--safe-right));
  bottom:calc(72px + var(--safe-bottom));
  width:44px;height:44px;border-radius:99px;
  background:linear-gradient(135deg,#3b82f6,#a855f7);
  color:#fff;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(59,130,246,0.38);
  z-index:450;opacity:0;pointer-events:none;transform:scale(0.8);
  transition:opacity 0.3s,transform 0.3s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
#scrollTopBtn.show{opacity:1;pointer-events:auto;transform:scale(1);}
/* BOTTOM NAV */
#bottomNav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:490;
  background:rgba(10,17,35,0.97);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:6px 0 calc(6px + var(--safe-bottom));
}
.bnav-inner{display:flex;align-items:center;}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 4px;color:rgba(255,255,255,0.42);
  font-size:0.58rem;font-weight:600;letter-spacing:0.02em;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:color 0.18s;
}
.bnav-btn .bn-icon{font-size:1.2rem;}
.bnav-btn.active{color:#3b82f6;}
/* SEARCH MODAL */
#searchModal{
  display:none;position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:flex-start;justify-content:center;
  padding:calc(20px + var(--safe-top)) 14px 20px;
}
#searchModal.show{display:flex;}
.search-box{
  background:#fff;border-radius:var(--radius);
  width:100%;max-width:560px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  max-height:calc(80vh - 40px);display:flex;flex-direction:column;
}
.search-box input{
  width:100%;padding:15px 16px;font-size:1rem;
  border:none;outline:none;border-bottom:1px solid #e2e8f0;color:#1e293b;background:#fff;
}
.search-box input::placeholder{color:#94a3b8;}
.search-results-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.sr-item{
  display:flex;align-items:center;gap:12px;padding:11px 16px;
  border-bottom:1px solid #f1f5f9;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background 0.15s;
}
.sr-item:active{background:#f8fafc;}
.sr-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.sr-name{font-weight:600;font-size:0.9rem;color:#1e293b;}
.sr-sub{font-size:0.73rem;color:#64748b;}
.sr-empty{padding:30px;text-align:center;color:#94a3b8;font-size:0.9rem;}
.search-close-btn{
  padding:12px 16px;border-top:1px solid #e2e8f0;
  text-align:center;font-size:0.83rem;color:#64748b;
  cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.search-close-btn:active{background:#f8fafc;}
/* DARK MODE */
body.dark{background:#0f172a;color:#e2e8f0;}
body.dark .stat-card{background:#1e293b;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
body.dark .stat-card .s-val{color:#e2e8f0;}
body.dark .stat-card .s-lbl{color:#94a3b8;}
body.dark .ch-card{background:#1e293b;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
body.dark .ch-body-inner{background:#1e293b;}
body.dark .blue-card{background:rgba(59,130,246,0.12);border-color:rgba(59,130,246,0.25);color:#bfdbfe;}
body.dark .blue-card h4{color:#93c5fd;}
body.dark .red-card{background:rgba(239,68,68,0.12);border-color:rgba(239,68,68,0.25);color:#fecaca;}
body.dark .red-card h4{color:#fca5a5;}
body.dark .green-card{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.25);color:#bbf7d0;}
body.dark .green-card h4{color:#86efac;}
body.dark .orange-card{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.25);color:#fed7aa;}
body.dark .orange-card h4{color:#fdba74;}
body.dark .purple-card{background:rgba(168,85,247,0.12);border-color:rgba(168,85,247,0.25);color:#e9d5ff;}
body.dark .purple-card h4{color:#d8b4fe;}
body.dark .teal-card{background:rgba(20,184,166,0.12);border-color:rgba(20,184,166,0.25);color:#99f6e4;}
body.dark .teal-card h4{color:#5eead4;}
body.dark .danger-box{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.28);color:#fca5a5;}
body.dark .pearl-box{background:rgba(234,179,8,0.1);border-color:rgba(234,179,8,0.28);color:#fde68a;}
body.dark .search-box{background:#1e293b;}
body.dark .search-box input{background:#1e293b;color:#e2e8f0;border-color:rgba(255,255,255,0.1);}
body.dark .sr-item:active{background:#263449;}
body.dark .sr-name{color:#e2e8f0;}
body.dark .search-close-btn{border-color:rgba(255,255,255,0.08);color:#94a3b8;}
body.dark .checklist li{border-bottom-color:rgba(255,255,255,0.04);}
/* DESKTOP */
@media(min-width:768px){
  #sidebar{transform:translateX(0)!important;transition:none;}
  #overlay{display:none!important;}
  #menuBtn{display:none;}
  #bottomNav{display:none!important;}
  #topbar{left:var(--sidebar-w);}
  #scrollTopBtn{bottom:24px;}
  #pageContent{margin-left:var(--sidebar-w);padding:20px 28px 60px 28px;max-width:none;}
  .stats-row{gap:14px;}
}
/* MOBILE */
@media(max-width:767px){
  #bottomNav{display:block;}
  #menuBtn{display:flex;}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:10px;}
}
@media(min-width:1200px){
  #pageContent{padding:24px 40px 60px 40px;}
}
.no-results{text-align:center;padding:60px 20px;color:#94a3b8;}
.no-results .nr-icon{font-size:2.5rem;margin-bottom:10px;}
.no-results p{font-size:0.9rem;}
</style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>
<aside id="sidebar">
  <div class="s-head">
    <div class="s-logo-row">
      <div class="s-logo-icon">🩺</div>
      <div class="s-logo-txt"><strong>ClinProcedures</strong><span>Dehn &amp; Asprey · 4th Ed.</span></div>
      <button id="closeBtn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="s-search-wrap">
      <span class="s-search-icon">🔍</span>
      <input type="search" id="sSearch" placeholder="Search chapters…" oninput="filterChapters(this.value)" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
  <div class="s-list-wrap" id="sidebarList"></div>
</aside>
<header id="topbar">
  <button id="menuBtn" onclick="openSidebar()">☰</button>
  <div class="t-logo">🩺</div>
  <div class="t-title">Essential Clinical Procedures</div>
  <div class="t-progress">
    <span class="t-prog-txt" id="progTxt">0/40</span>
    <div class="t-prog-bg"><div class="t-prog-fill" id="progFill"></div></div>
  </div>
</header>
<div id="spacer"></div>
<main id="pageContent">
  <div class="stats-row">
    <div class="stat-card"><span class="s-icon">📚</span><span class="s-val">40</span><span class="s-lbl">Chapters</span></div>
    <div class="stat-card"><span class="s-icon">📄</span><span class="s-val">400+</span><span class="s-lbl">Pages</span></div>
    <div class="stat-card"><span class="s-icon">✅</span><span class="s-val" id="doneNum">0</span><span class="s-lbl">Done</span></div>
    <div class="stat-card"><span class="s-icon">📊</span><span class="s-val" id="pctNum">0%</span><span class="s-lbl">Progress</span></div>
  </div>
  <div id="cardsContainer"></div>
</main>
<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>
<nav id="bottomNav">
  <div class="bnav-inner">
    <button class="bnav-btn active" id="bnAll"><span class="bn-icon">📚</span><span>All</span></button>
    <button class="bnav-btn" id="bnChap" onclick="openSidebar()"><span class="bn-icon">☰</span><span>Chapters</span></button>
    <button class="bnav-btn" id="bnSearch" onclick="openSearchModal()"><span class="bn-icon">🔍</span><span>Search</span></button>

            <div class="info-grid">

                <div class="info-card green-card"><h4>🧤 PPE Requirements</h4><ul class="dot-list"><li><strong>Gloves:</strong> any contact with blood/body fluids/mucous membranes</li><li><strong>Gown:</strong> anticipated splash or spray</li><li><strong>Mask + eye shield/face shield:</strong> splash/aerosol-generating procedures</li><li><strong>N95 respirator:</strong> airborne precautions (TB, measles, chickenpox, COVID)</li></ul></div>

const GRADIENTS={c1:'linear-gradient(135deg,#ef4444,#f97316)',c2:'linear-gradient(135deg,#3b82f6,#06b6d4)',c3:'linear-gradient(135deg,#22c55e,#14b8a6)',c4:'linear-gradient(135deg,#a855f7,#6366f1)',c5:'linear-gradient(135deg,#f97316,#f59e0b)',c6:'linear-gradient(135deg,#14b8a6,#22c55e)',c7:'linear-gradient(135deg,#64748b,#94a3b8)',c8:'linear-gradient(135deg,#f59e0b,#ef4444)',c9:'linear-gradient(135deg,#06b6d4,#3b82f6)',c10:'linear-gradient(135deg,#ec4899,#a855f7)',c11:'linear-gradient(135deg,#334155,#1e293b)',c12:'linear-gradient(135deg,#94a3b8,#64748b)'};
const EMOJIS=['🔬','💉','🩺','🦴','❄️','🧴','🩹','🏥','💊','🫀','🩻','🔪','💉','🩸','🦵','💊','🧠','🪱','🩸','🫁','📡','😴','❤️','🦾','👂','💍','🔬','🫁','🩸','✂️','🦷','🧵','🩹','📋','🧤','🧪','📚','🔬','🫀','🏃'];
let doneSet=new Set(),isDark=false;
function renderCards(list){
  var c=document.getElementById('cardsContainer');c.innerHTML='';
  if(!list.length){c.innerHTML='<div class="no-results"><div class="nr-icon">🔍</div><p>No chapters found</p></div>';return;}
  list.forEach(function(ch,i){
    var idx=chapters.indexOf(ch),g=GRADIENTS[ch.color]||GRADIENTS.c1,em=EMOJIS[idx]||'📋',done=doneSet.has(idx);
    var d=document.createElement('div');d.className='ch-card';d.id='card-'+idx;
    d.style.animationDelay=Math.min(i*0.025,0.3)+'s';
    d.innerHTML='<div class="ch-head" style="background:'+g+'" onclick="toggleCard('+idx+')">'
      +'<div class="ch-icon">'+em+'</div>'
      +'<div class="ch-meta"><div class="ch-ttl">Ch.'+ch.num+' — '+ch.title+'</div>'
      +'<div class="ch-tags"><span class="ch-tag">📄 pp.'+ch.startPage+'–'+ch.endPage+'</span>'
      +'<span class="ch-tag" id="tag-'+idx+'">'+(done?'✅ Done':'📖 Study')+'</span></div></div>'
      +'<div class="ch-actions">'
      +'<button class="ch-done-btn'+(done?' marked':'')+'" id="done-'+idx+'" onclick="event.stopPropagation();markDone('+idx+')" title="Mark complete">'+(done?'✅':'○')+'</button>'
      +'<div class="ch-arrow" id="arr-'+idx+'">▼</div></div></div>'
      +'<div class="ch-body" id="body-'+idx+'"><div class="ch-body-inner">'+ch.content+'</div></div>';
    c.appendChild(d);
  });
}
function renderSidebar(list){
  var sl=document.getElementById('sidebarList');sl.innerHTML='';
  list.forEach(function(ch){
    var idx=chapters.indexOf(ch),g=GRADIENTS[ch.color]||GRADIENTS.c1;
    var b=document.createElement('button');b.className='s-item';b.id='sb-'+idx;
    b.innerHTML='<span class="s-num" style="background:'+g+'">'+ch.num+'</span><span class="s-ttl">'+ch.title+'</span><span class="s-pg">p.'+ch.startPage+'</span>';
    b.addEventListener('click',function(){jumpToChapter(idx);if(window.innerWidth<768)closeSidebar();});
    sl.appendChild(b);
  });
}
function toggleCard(idx){
  var body=document.getElementById('body-'+idx),arr=document.getElementById('arr-'+idx);
  if(!body)return;var opening=!body.classList.contains('open');
  body.classList.toggle('open',opening);if(arr)arr.classList.toggle('open',opening);
}
function markDone(idx){
  if(doneSet.has(idx))doneSet.delete(idx);else doneSet.add(idx);
  var done=doneSet.has(idx);
  var btn=document.getElementById('done-'+idx),tag=document.getElementById('tag-'+idx);
  if(btn){btn.textContent=done?'✅':'○';btn.classList.toggle('marked',done);}
  if(tag)tag.textContent=done?'✅ Done':'📖 Study';
  updateProgress();
}
function updateProgress(){
  var n=doneSet.size,total=chapters.length;
  document.getElementById('doneNum').textContent=n;
  document.getElementById('pctNum').textContent=Math.round(n/total*100)+'%';
  document.getElementById('progTxt').textContent=n+'/'+total;
  document.getElementById('progFill').style.width=(n/total*100)+'%';
}
function jumpToChapter(idx){
  var card=document.getElementById('card-'+idx);if(!card)return;
  var body=document.getElementById('body-'+idx),arr=document.getElementById('arr-'+idx);
  if(body&&!body.classList.contains('open')){body.classList.add('open');if(arr)arr.classList.add('open');}
  setTimeout(function(){
    var tbH=document.getElementById('topbar').offsetHeight||58;
    var rect=card.getBoundingClientRect();
    window.scrollTo({top:window.pageYOffset+rect.top-tbH-8,behavior:'smooth'});
  },50);
  document.querySelectorAll('.s-item').forEach(function(b){b.classList.remove('active');});
  var sb=document.getElementById('sb-'+idx);if(sb)sb.classList.add('active');
}
function filterChapters(q){
  q=q.trim().toLowerCase();
  var list=q?chapters.filter(function(c){return c.title.toLowerCase().includes(q)||c.num.includes(q);}):chapters;
  renderCards(list);renderSidebar(list);
}
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  var o=document.getElementById('overlay');o.classList.add('show');
  requestAnimationFrame(function(){requestAnimationFrame(function(){o.classList.add('visible');});});
  document.body.style.overflow='hidden';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  var o=document.getElementById('overlay');o.classList.remove('visible');
  setTimeout(function(){o.classList.remove('show');},300);
  document.body.style.overflow='';
}
function openSearchModal(){
  document.getElementById('searchModal').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(function(){document.getElementById('modalSearch').focus();},200);
}
function closeSearchModal(){
  document.getElementById('searchModal').classList.remove('show');
  document.getElementById('modalSearch').value='';
  document.getElementById('searchResults').innerHTML='';
  document.body.style.overflow='';
}
function modalOutsideClick(e){if(e.target===document.getElementById('searchModal'))closeSearchModal();}
function doModalSearch(q){
  var res=document.getElementById('searchResults');
  if(!q.trim()){res.innerHTML='';return;}
  var matches=chapters.filter(function(c){return c.title.toLowerCase().includes(q.toLowerCase())||c.num.includes(q);});
  if(!matches.length){res.innerHTML='<div class="sr-empty">No results for "'+q+'"</div>';return;}
  res.innerHTML=matches.map(function(ch){
    var idx=chapters.indexOf(ch),g=GRADIENTS[ch.color]||GRADIENTS.c1,em=EMOJIS[idx]||'📋';
    return'<div class="sr-item" onclick="closeSearchModal();jumpToChapter('+idx+')">'
      +'<div class="sr-icon" style="background:'+g+'">'+em+'</div>'
      +'<div><div class="sr-name">'+ch.title+'</div><div class="sr-sub">Chapter '+ch.num+' · pp.'+ch.startPage+'–'+ch.endPage+'</div></div></div>';
  }).join('');
}
function toggleDark(){
  isDark=!isDark;document.body.classList.toggle('dark',isDark);
  document.getElementById('darkIcon').textContent=isDark?'☀️':'🌙';
}
window.addEventListener('scroll',function(){
  var y=window.pageYOffset||document.documentElement.scrollTop||0;
  document.getElementById('scrollTopBtn').classList.toggle('show',y>350);
  var cards=document.querySelectorAll('.ch-card'),tbH=62,active=0;
  cards.forEach(function(card,i){if(card.getBoundingClientRect().top<=tbH+40)active=i;});
  document.querySelectorAll('.s-item').forEach(function(b,i){b.classList.toggle('active',i===active);});
},{passive:true});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeSidebar();closeSearchModal();}});
renderCards(chapters);renderSidebar(chapters);updateProgress();
window.addEventListener('load',function(){
  var tbH=document.getElementById('topbar').offsetHeight;
  document.getElementById('spacer').style.height=tbH+'px';
});
</script>

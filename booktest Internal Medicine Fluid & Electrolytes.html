<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fluid & Electrolytes — Internal Medicine</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6fb;color:#1a1a2e;min-height:100vh}

  /* HEADER */
  .hdr{background:#0f2547;color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25)}
  .hdr-left{display:flex;flex-direction:column;gap:2px}
  .hdr-subject{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;opacity:.6}
  .hdr-title{font-size:15px;font-weight:600}
  .hdr-right{display:flex;align-items:center;gap:16px}
  .hdr-stats{text-align:right;font-size:12px;opacity:.75;line-height:1.6}
  .timer-box{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 18px;text-align:center;min-width:100px}
  .timer-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:.6}
  .timer-val{font-size:22px;font-weight:700;font-family:'Courier New',monospace;letter-spacing:2px}
  .timer-warn{color:#fbbf24}
  .timer-crit{color:#f87171;animation:blink .7s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* PROGRESS BAR */
  .prog-bar-wrap{height:3px;background:#e2e8f0}
  .prog-bar{height:3px;background:#2563eb;transition:width .4s ease}

  /* MAIN LAYOUT */
  .layout{display:grid;grid-template-columns:1fr 250px;gap:0;max-width:1200px;margin:0 auto;padding:20px 16px;gap:16px}

  /* QUESTION CARD */
  .q-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .q-num{background:#0f2547;color:#fff;font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px}
  .q-type{font-size:11px;color:#64748b;background:#f1f5f9;padding:4px 10px;border-radius:20px;border:1px solid #e2e8f0}
  .mark-badge{font-size:11px;background:#fef3c7;color:#92400e;padding:4px 10px;border-radius:20px;border:1px solid #fde68a}
  .q-text{font-size:15.5px;line-height:1.75;color:#1a1a2e;margin-bottom:22px;font-weight:400}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;transition:all .15s;background:#fff}
  .opt:hover{border-color:#93c5fd;background:#eff6ff}
  .opt.selected{border-color:#2563eb;background:#eff6ff}
  .opt.correct{border-color:#16a34a;background:#f0fdf4;cursor:default}
  .opt.wrong{border-color:#dc2626;background:#fef2f2;cursor:default}
  .opt.show-correct{border-color:#16a34a;background:#f0fdf4;cursor:default}
  .opt-key{width:30px;height:30px;min-width:30px;border-radius:50%;border:1.5px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#475569;flex-shrink:0;transition:all .15s}
  .opt.selected .opt-key{background:#2563eb;border-color:#2563eb;color:#fff}
  .opt.correct .opt-key{background:#16a34a;border-color:#16a34a;color:#fff}
  .opt.wrong .opt-key{background:#dc2626;border-color:#dc2626;color:#fff}
  .opt.show-correct .opt-key{background:#16a34a;border-color:#16a34a;color:#fff}
  .opt-text{font-size:14px;line-height:1.6;color:#1e293b;padding-top:4px}

  /* ACTIONS */
  .q-actions{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid #f1f5f9;flex-wrap:wrap;gap:10px}
  .btn{padding:9px 18px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
  .btn-mark{background:#fff7ed;border:1px solid #fed7aa;color:#c2410c}
  .btn-mark:hover{background:#ffedd5}
  .btn-mark.marked{background:#fef3c7;border-color:#fde68a;color:#92400e}
  .btn-clear{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b}
  .btn-clear:hover{background:#f1f5f9}
  .btn-prev{background:#fff;border:1.5px solid #e2e8f0;color:#374151}
  .btn-prev:hover{background:#f9fafb}
  .btn-prev:disabled{opacity:.4;cursor:not-allowed}
  .btn-next{background:#0f2547;color:#fff}
  .btn-next:hover{background:#1a3a6e}
  .btn-submit-main{background:#dc2626;color:#fff;padding:10px 24px;font-size:14px;font-weight:600;border-radius:9px;border:none;cursor:pointer;width:100%;margin-top:4px;font-family:inherit;transition:all .15s}
  .btn-submit-main:hover{background:#b91c1c}

  /* SIDEBAR */
  .sidebar{display:flex;flex-direction:column;gap:14px}
  .side-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .side-title{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}

  /* PALETTE */
  .palette-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .pq{width:100%;aspect-ratio:1;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
  .pq:hover{transform:scale(1.12);z-index:2;position:relative}
  .pq-unattempted{background:#f1f5f9;color:#94a3b8}
  .pq-answered{background:#1d4ed8;color:#fff}
  .pq-marked{background:#f59e0b;color:#fff}
  .pq-current{outline:2.5px solid #0f2547;outline-offset:2px}
  .legend{display:flex;flex-direction:column;gap:7px;margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9}
  .leg-row{display:flex;align-items:center;gap:8px;font-size:11px;color:#64748b}
  .leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stat-box{background:#f8fafc;border-radius:9px;padding:10px;text-align:center;border:1px solid #f1f5f9}
  .stat-val{font-size:20px;font-weight:700;color:#1a1a2e}
  .stat-label{font-size:10px;color:#94a3b8;margin-top:1px}

  /* MODAL */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s ease}
  .modal{background:#fff;border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-icon{font-size:40px;margin-bottom:12px}
  .modal h3{font-size:17px;font-weight:700;margin-bottom:8px;color:#1a1a2e}
  .modal p{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:22px}
  .modal-btns{display:flex;gap:10px;justify-content:center}
  .modal-cancel{background:#f1f5f9;border:none;color:#374151;padding:10px 20px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
  .modal-cancel:hover{background:#e2e8f0}
  .modal-confirm{background:#dc2626;color:#fff;border:none;padding:10px 24px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .modal-confirm:hover{background:#b91c1c}

  /* RESULT PAGE */
  .result-wrap{max-width:900px;margin:0 auto;padding:24px 16px;animation:fadeUp .5s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .result-hero{background:#0f2547;border-radius:16px;padding:28px;color:#fff;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
  .result-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
  .result-hero::after{content:'';position:absolute;bottom:-60px;left:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
  .result-hero-title{font-size:20px;font-weight:700;margin-bottom:4px}
  .result-hero-sub{font-size:12px;opacity:.6;margin-bottom:20px}
  .score-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 16px}
  .score-ring-wrap svg{transform:rotate(-90deg)}
  .score-ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .score-ring-num{font-size:26px;font-weight:700;line-height:1}
  .score-ring-denom{font-size:12px;opacity:.6}
  .hero-stats{display:flex;justify-content:center;gap:28px;margin-top:16px;flex-wrap:wrap}
  .hero-stat{text-align:center}
  .hero-stat-val{font-size:18px;font-weight:700}
  .hero-stat-label{font-size:10px;opacity:.6;letter-spacing:.5px}
  .score-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .sc{background:#fff;border-radius:12px;padding:16px;text-align:center;border:1px solid #e2e8f0;box-shadow:0 2px 6px rgba(0,0,0,.05)}
  .sc-val{font-size:26px;font-weight:700}
  .sc-label{font-size:11px;color:#94a3b8;margin-top:3px}
  .sc-c .sc-val{color:#16a34a}
  .sc-w .sc-val{color:#dc2626}
  .sc-s .sc-val{color:#f59e0b}
  .sc-n .sc-val{color:#2563eb}
  @keyframes countUp{from{opacity:0;transform:scale(.4) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .animate-pop{animation:countUp .7s cubic-bezier(.34,1.56,.64,1) both}
  .animate-pop:nth-child(2){animation-delay:.1s}
  .animate-pop:nth-child(3){animation-delay:.2s}
  .animate-pop:nth-child(4){animation-delay:.3s}

  /* PERFORMANCE BAR */
  .perf-card{background:#fff;border-radius:12px;padding:18px;border:1px solid #e2e8f0;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
  .perf-title{font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
  .perf-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .perf-row:last-child{margin-bottom:0}
  .perf-lbl{font-size:12px;color:#475569;width:90px;flex-shrink:0}
  .perf-bar-track{flex:1;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden}
  .perf-bar-fill{height:100%;border-radius:5px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
  .perf-count{font-size:12px;font-weight:600;width:24px;text-align:right}

  /* REVIEW */
  .review-hdr{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px}
  .rq{background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .2s}
  .rq:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .rq-hdr{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
  .rq-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .dot-c{background:#16a34a}
  .dot-w{background:#dc2626}
  .dot-s{background:#f59e0b}
  .rq-num{font-size:11px;font-weight:700;color:#94a3b8;flex-shrink:0;padding-top:2px}
  .rq-qtxt{font-size:13px;color:#1e293b;flex:1;line-height:1.5}
  .rq-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0;align-self:flex-start}
  .badge-c{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
  .badge-w{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
  .badge-s{background:#fefce8;color:#a16207;border:1px solid #fef08a}
  .rq-chev{font-size:18px;color:#94a3b8;transition:transform .22s;flex-shrink:0;align-self:center}
  .rq-chev.open{transform:rotate(180deg)}
  .rq-body{display:none;padding:0 16px 18px;border-top:1px solid #f8fafc}
  .rq-body.show{display:block;animation:fadeUp .2s ease}
  .rq-opts{display:flex;flex-direction:column;gap:7px;margin:14px 0}
  .rq-opt{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:8px;font-size:13px}
  .rq-opt.neutral{background:#f8fafc;color:#475569}
  .rq-opt.correct{background:#f0fdf4;color:#15803d}
  .rq-opt.wrong{background:#fef2f2;color:#dc2626}
  .rq-ok{width:22px;height:22px;min-width:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid currentColor;flex-shrink:0}
  .rq-opt.correct .rq-ok{background:#16a34a;border-color:#16a34a;color:#fff}
  .rq-opt.wrong .rq-ok{background:#dc2626;border-color:#dc2626;color:#fff}
  .your-ans-line{font-size:12px;color:#64748b;margin-bottom:10px;padding:8px 12px;background:#f8fafc;border-radius:7px}
  .exp-box{background:#eff6ff;border-left:4px solid #2563eb;border-radius:0 8px 8px 0;padding:12px 14px}
  .exp-lbl{font-size:10px;font-weight:700;color:#1d4ed8;letter-spacing:1px;margin-bottom:5px}
  .exp-txt{font-size:12.5px;line-height:1.75;color:#1e3a5f}

  @media(max-width:768px){
    .layout{grid-template-columns:1fr;padding:12px}
    .score-cards{grid-template-columns:repeat(2,1fr)}
    .sidebar{order:-1}
    .hero-stats{gap:16px}
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div id="app">

<!-- QUIZ VIEW -->
<div id="quiz-view">
  <div class="hdr">
    <div class="hdr-left">
      <span class="hdr-subject">Internal Medicine</span>
      <span class="hdr-title">Fluid &amp; Electrolytes — Mock Test</span>
    </div>
    <div class="hdr-right">
      <div class="hdr-stats">
        <div id="q-prog">Q 1 / 25</div>
        <div id="q-ans-count">0 answered</div>
      </div>
      <div class="timer-box">
        <div class="timer-label">Time Left</div>
        <div class="timer-val" id="timer">25:00</div>
      </div>
    </div>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:4%"></div></div>

  <div class="layout">
    <!-- Question Panel -->
    <div>
      <div class="q-card">
        <div class="q-meta">
          <span class="q-num" id="qnum">Q 1</span>
          <span class="q-type">Single Best Answer</span>
          <span class="mark-badge" id="mark-badge" style="display:none">⚑ Marked for Review</span>
        </div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options"></div>
        <div class="q-actions">
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-mark" id="btn-mark" onclick="toggleMark()">⚑ Mark for Review</button>
            <button class="btn btn-clear" onclick="clearAns()">✕ Clear Response</button>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-prev" id="btn-prev" onclick="nav(-1)">← Prev</button>
            <button class="btn btn-next" id="btn-next" onclick="nav(1)">Next →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="side-card">
        <div class="side-title">Question Palette</div>
        <div class="palette-grid" id="palette"></div>
        <div class="legend">
          <div class="leg-row"><div class="leg-dot" style="background:#1d4ed8"></div>Answered</div>
          <div class="leg-row"><div class="leg-dot" style="background:#f59e0b"></div>Marked for Review</div>
          <div class="leg-row"><div class="leg-dot" style="background:#f1f5f9;border:1px solid #cbd5e1"></div>Not Attempted</div>
        </div>
      </div>
      <div class="side-card">
        <div class="side-title">Summary</div>
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-val" id="s-ans">0</div><div class="stat-label">Answered</div></div>
          <div class="stat-box"><div class="stat-val" id="s-mrk">0</div><div class="stat-label">Marked</div></div>
          <div class="stat-box"><div class="stat-val" id="s-un">25</div><div class="stat-label">Not Attempted</div></div>
          <div class="stat-box"><div class="stat-val">25</div><div class="stat-label">Total Qs</div></div>
        </div>
      </div>
      <button class="btn-submit-main" onclick="showModal()">🚀 Submit Test</button>
    </div>
  </div>
</div>

<!-- RESULT VIEW -->
<div id="result-view" style="display:none"></div>

<!-- MODAL -->
<div id="modal" style="display:none"></div>

</div>

<script>
const QUESTIONS = [
  {q:"A 60-year-old euvolemic patient has serum Na⁺ 118 mEq/L, urine osmolality 620 mOsm/kg, and urine Na⁺ 42 mEq/L. What is the most likely diagnosis?",opts:["Central diabetes insipidus","SIADH","Nephrogenic diabetes insipidus","Psychogenic polydipsia"],ans:1,exp:"SIADH presents with euvolemic hyponatremia + inappropriately concentrated urine (urine osm >100 mOsm/kg) + elevated urine Na⁺ (>20 mEq/L) + no adrenal/thyroid/renal disease. The concentrated urine despite low serum osmolality is pathognomonic of SIADH."},
  {q:"The FIRST ECG change seen in hyperkalemia is:",opts:["Widened QRS complex","Flattened P waves","Peaked (tall, narrow, symmetric) T waves","Sine wave pattern"],ans:2,exp:"ECG changes in hyperkalemia occur in order: peaked T waves (K⁺ >5.5–6) → prolonged PR interval → flattened/absent P waves → widened QRS → sine wave → VF/asystole. Peaked T waves appear earliest and are the first warning sign."},
  {q:"Maximum safe rate of sodium correction in chronic hyponatremia to prevent osmotic demyelination syndrome (ODS) is:",opts:["20 mEq/L in 24 hours","8–10 mEq/L in 24 hours","16 mEq/L in 24 hours","4 mEq/L in 24 hours"],ans:1,exp:"Safe correction limit = 8–10 mEq/L per 24 hours (maximum 12 mEq/L/24 hr) in chronic hyponatremia. Rapid correction risks osmotic demyelination syndrome (central pontine myelinolysis), causing quadriplegia, pseudobulbar palsy, and locked-in syndrome."},
  {q:"Chvostek's sign and Trousseau's sign are classic features of:",opts:["Hypomagnesemia only","Hypocalcemia (and hypomagnesemia)","Hyponatremia","Hypokalemia"],ans:1,exp:"Trousseau's sign (carpal spasm with BP cuff inflation for 3 min) and Chvostek's sign (facial twitch on tapping facial nerve) indicate hypocalcemia. They also occur in hypomagnesemia since Mg²⁺ deficiency impairs PTH secretion and action, causing secondary hypocalcemia."},
  {q:"A patient with serum K⁺ of 6.9 mEq/L shows peaked T waves and widened QRS on ECG. What is the FIRST step in management?",opts:["Sodium bicarbonate IV","Calcium gluconate IV","Insulin + Dextrose IV","Sodium polystyrene sulfonate (Kayexalate)"],ans:1,exp:"Calcium gluconate is given FIRST in severe hyperkalemia with ECG changes. It stabilizes cardiac membranes within 1–3 minutes (cardioprotection) but does NOT lower serum K⁺. After stabilizing the heart, use insulin+dextrose and/or sodium bicarbonate to shift K⁺ intracellularly."},
  {q:"Normal serum osmolality range is:",opts:["260–275 mOsm/kg","275–295 mOsm/kg","295–310 mOsm/kg","285–315 mOsm/kg"],ans:1,exp:"Normal plasma osmolality = 275–295 mOsm/kg. Formula: 2 × Na⁺ + (glucose/18) + (BUN/2.8). Sodium is the major contributor (~90%). Values >295 = hyperosmolality; <275 = hypo-osmolality."},
  {q:"An alcoholic patient has serum Mg²⁺ of 0.6 mEq/L and refractory hypokalemia despite K⁺ replacement. The MOST appropriate next step is:",opts:["Continue with higher-dose K⁺ replacement","Replace magnesium first, then recheck K⁺","Add spironolactone","Check aldosterone levels"],ans:1,exp:"Hypomagnesemia causes refractory hypokalemia by impairing Na-K-ATPase activity and increasing renal K⁺ wasting. Hypokalemia CANNOT be corrected until Mg²⁺ is replaced. Similarly, hypomagnesemia causes refractory hypocalcemia (impairs PTH secretion). Always correct Mg²⁺ first."},
  {q:"Anion gap (AG) in metabolic acidosis is calculated as:",opts:["Na⁺ − Cl⁻ − HCO₃⁻","Na⁺ + K⁺ − Cl⁻ − HCO₃⁻","Na⁺ − (Cl⁻ + HCO₃⁻)","(Cl⁻ + HCO₃⁻) − Na⁺"],ans:2,exp:"AG = Na⁺ − (Cl⁻ + HCO₃⁻). Normal AG = 8–12 mEq/L (unmeasured anions: albumin, phosphate, sulfate). In hypoalbuminemia, correct AG: add 2.5 × (4 − albumin g/dL) to measured AG. MUDPILES causes high AG; HARDUP causes normal AG metabolic acidosis."},
  {q:"MUDPILES mnemonic represents causes of:",opts:["Normal anion gap metabolic acidosis","High anion gap metabolic acidosis","Metabolic alkalosis","Respiratory acidosis"],ans:1,exp:"MUDPILES = Methanol, Uremia, DKA, Propylene glycol, Isoniazid/Iron, Lactic acidosis, Ethylene glycol, Salicylates — all causes of HIGH anion gap metabolic acidosis. Normal AG metabolic acidosis (HARDUP): Hyperalimentation, Addison's, RTA, Diarrhea, Ureteroenteric fistula, Pancreatic fistula."},
  {q:"A patient has: pH 7.52, PaCO₂ 48 mmHg, HCO₃⁻ 38 mEq/L. The acid-base disorder is:",opts:["Respiratory alkalosis with metabolic compensation","Metabolic alkalosis with respiratory compensation","Mixed metabolic alkalosis + respiratory acidosis","Respiratory acidosis with metabolic compensation"],ans:1,exp:"Primary metabolic alkalosis: ↑pH + ↑HCO₃⁻. Respiratory compensation = hypoventilation (↑PaCO₂). Expected PaCO₂ = 0.7 × HCO₃⁻ + 21 ± 2 = 47.6 mmHg. Observed = 48 mmHg → appropriate compensation. Diagnosis: Primary metabolic alkalosis with appropriate respiratory compensation."},
  {q:"Which IV fluid is MOST appropriate for initial resuscitation in hypovolemic shock?",opts:["5% Dextrose (D5W)","0.45% NaCl (half-normal saline)","Ringer's lactate","3% NaCl (hypertonic saline)"],ans:2,exp:"Isotonic crystalloids — Ringer's lactate (preferred) or 0.9% normal saline — are used for hypovolemic shock. D5W distributes throughout total body water (only ~8% stays intravascular) — ineffective for volume expansion. Hypertonic saline is used for severe cerebral edema/TBI, not routine resuscitation."},
  {q:"Liddle syndrome is characterised by:",opts:["Hypokalemia, hypertension, high plasma aldosterone","Hypokalemia, hypertension, LOW plasma aldosterone","Hyperkalemia, hypertension, high plasma aldosterone","Hyperkalemia, hypotension, low plasma aldosterone"],ans:1,exp:"Liddle syndrome: gain-of-function mutation in ENaC (epithelial Na⁺ channel) → constitutive Na⁺ retention → hypertension, hypokalemia, metabolic alkalosis, but LOW aldosterone (suppressed by volume expansion). Called pseudohyperaldosteronism. Treated with amiloride/triamterene (not spironolactone)."},
  {q:"A patient on prolonged NG aspiration develops metabolic alkalosis with urine Cl⁻ of 8 mEq/L. This is best described as:",opts:["Saline-resistant metabolic alkalosis","Saline-responsive metabolic alkalosis","Hyperaldosteronism-related alkalosis","Bartter syndrome"],ans:1,exp:"Urine Cl⁻ <15 mEq/L = saline-responsive metabolic alkalosis (volume-depleted states: vomiting, NG suction, past diuretic use). Treated with isotonic saline + KCl. Urine Cl⁻ >20 mEq/L = saline-resistant (primary hyperaldosteronism, Bartter/Gitelman, active diuretic use) — treat the underlying cause."},
  {q:"Which test BEST differentiates central diabetes insipidus (CDI) from nephrogenic DI (NDI)?",opts:["Serum sodium level","Urine osmolality after water deprivation test only","Response to exogenous desmopressin (DDAVP)","Plasma ADH level measurement"],ans:2,exp:"After water deprivation, both CDI and NDI fail to adequately concentrate urine. After desmopressin: CDI responds with >50% increase in urine osmolality (tubules intact, ADH-deficient). NDI shows partial or no response (tubules resistant to ADH). This differentiates the two definitively."},
  {q:"The MOST common cause of pseudohyponatremia (low Na⁺ with normal measured osmolality) is:",opts:["Severe hypertriglyceridemia","Hyperglycemia","Mannitol infusion","SIADH"],ans:0,exp:"Pseudohyponatremia = low measured Na⁺ with NORMAL/unchanged plasma osmolality. Cause: severe hyperlipidemia or hyperproteinemia (myeloma) — lipids/proteins displace water volume in the plasma sample (lab artifact with flame photometry). Hyperglycemia and mannitol cause TRUE dilutional hyponatremia with HIGH osmolality."},
  {q:"In Addison's disease presenting with hyponatremia and hyperkalemia, the MOST appropriate management is:",opts:["IV saline only","Hydrocortisone + fludrocortisone + IV saline","Fludrocortisone alone","Spironolactone"],ans:1,exp:"Primary adrenal insufficiency requires glucocorticoid (hydrocortisone 100–200 mg IV for acute crisis) + mineralocorticoid (fludrocortisone 0.1 mg/day) replacement + saline for volume. Glucocorticoids alone insufficient — mineralocorticoids correct hyperkalemia and sodium wasting."},
  {q:"The Parkland formula for fluid resuscitation in burns (first 24 hours) is:",opts:["2 mL × kg × % TBSA of Ringer's lactate","4 mL × kg × % TBSA of normal saline","4 mL × kg × % TBSA of Ringer's lactate","2 mL × kg × % TBSA of normal saline"],ans:2,exp:"Parkland formula = 4 mL/kg/% TBSA burned of Ringer's lactate in first 24 hours. Give 1st half in first 8 hours from time of burn, 2nd half over next 16 hours. Colloids are NOT given in the first 24 hours (capillary leak phase). Modified Brooke formula uses 2 mL/kg/% TBSA."},
  {q:"In DKA, despite normal or elevated serum K⁺ on presentation, K⁺ supplementation is needed because:",opts:["Insulin causes K⁺ to shift out of cells","Total body K⁺ is depleted; insulin drives K⁺ intracellularly","Bicarbonate therapy causes K⁺ loss in urine","Renal K⁺ excretion increases with glucose correction"],ans:1,exp:"In DKA, acidosis shifts K⁺ extracellularly — serum K⁺ appears normal/high, masking total body depletion (3–5 mEq/kg). Once insulin is administered, K⁺ moves intracellularly → rapid fall in serum K⁺. Start K⁺ replacement when K⁺ <5.5 mEq/L; if K⁺ <3.5, hold insulin and correct K⁺ first."},
  {q:"How does Gitelman syndrome differ from Bartter syndrome?",opts:["Gitelman causes hypercalciuria; Bartter causes hypocalciuria","Gitelman causes hypomagnesemia + hypocalciuria; Bartter causes hypercalciuria","Gitelman presents in neonates; Bartter presents in adults","Bartter is autosomal dominant; Gitelman is sporadic"],ans:1,exp:"Bartter = loop of Henle defect (furosemide-like) → hypokalemia, metabolic alkalosis, HYPERCALCIURIA, normal Mg. Gitelman = distal tubule defect (thiazide-like) → hypokalemia, metabolic alkalosis, HYPOmagnesemia, HYPOCALCIURIA. Memory aid: Gitelman = Genteel (adult-onset, milder); Bartter = Bad (childhood, neonatal, severe)."},
  {q:"TURP syndrome (post-TURP hyponatremia) occurs due to:",opts:["SIADH from surgical stress response","Absorption of large volumes of hypotonic irrigation fluid","Excessive saline infusion causing dilutional hyponatremia","Renal water retention from general anesthesia"],ans:1,exp:"TURP syndrome: absorption of hypotonic irrigating fluid (glycine 1.5%, sorbitol, or mannitol) through prostatic venous sinuses → dilutional hyponatremia + hypervolemia. Glycine toxicity causes visual disturbances ('transient blindness'), nausea, and encephalopathy. Managed with fluid restriction ± hypertonic saline."},
  {q:"The HALLMARK electrolyte abnormality in refeeding syndrome is:",opts:["Hyponatremia","Hypokalemia","Hypophosphatemia","Hypomagnesemia"],ans:2,exp:"Refeeding syndrome hallmark = HYPOPHOSPHATEMIA. When malnourished patients receive carbohydrates: insulin surge → phosphate (+ K, Mg) shift intracellularly → severe hypophosphatemia. Consequences: hemolytic anemia, respiratory muscle failure, cardiac arrhythmias, rhabdomyolysis. Monitor and replete PO₄²⁻ BEFORE aggressive refeeding."},
  {q:"In true hypovolemia (pre-renal state), expected urinary findings are:",opts:["Urine Na >40 mEq/L, FeNa >2%","Urine Na <20 mEq/L, FeNa <1%","Urine Na >20 mEq/L, FeNa <1%","Urine Na <20 mEq/L, FeNa >2%"],ans:1,exp:"In hypovolemia, kidneys avidly conserve Na: urine Na <20 mEq/L and FeNa <1% (pre-renal). In ATN (intrinsic renal failure), tubular damage impairs Na reabsorption: urine Na >40, FeNa >2%. Exception: early contrast nephropathy, myoglobinuria — FeNa may be <1% despite ATN."},
  {q:"A patient with bulimia nervosa has: Na 138, K 2.8, Cl 88, HCO₃ 34 mEq/L. The acid-base disorder is:",opts:["Normal anion gap metabolic acidosis","High anion gap metabolic acidosis","Hypochloremic hypokalemic metabolic alkalosis","Respiratory alkalosis"],ans:2,exp:"AG = 138 − (88 + 34) = 16 (borderline high but within normal with albumin correction). High HCO₃⁻ + low Cl⁻ + low K⁺ = hypochloremic hypokalemic metabolic alkalosis. Cause: self-induced vomiting → loss of HCl → alkalosis. Secondary hyperaldosteronism drives further K⁺ loss. Classic electrolyte pattern of purging."},
  {q:"Which diuretic causes metabolic ACIDOSIS (not alkalosis)?",opts:["Furosemide (loop diuretic)","Hydrochlorothiazide (thiazide)","Acetazolamide (carbonic anhydrase inhibitor)","Spironolactone (aldosterone antagonist)"],ans:2,exp:"Acetazolamide blocks carbonic anhydrase → inhibits proximal tubular HCO₃⁻ reabsorption → bicarbonaturia → hyperchloremic normal anion gap metabolic acidosis + hypokalemia. Loop diuretics and thiazides cause metabolic ALkalosis (volume contraction + aldosterone activation). Spironolactone has minimal acid-base effect."},
  {q:"Free water deficit in hypernatremia is calculated as (TBW = 0.6 × body weight in males):",opts:["TBW × (Serum Na / 140 − 1)","TBW × (140 / Serum Na − 1)","TBW × (Serum Na − 140) / 140","0.5 × Body weight × Serum Na / 140"],ans:0,exp:"Free water deficit = TBW × (serum Na/140 − 1). TBW = 0.6 × weight (males) or 0.5 × weight (females). Example: 70 kg male with Na 160: Deficit = 42 × (160/140 − 1) = 42 × 0.143 = 6 L. Correct hypernatremia SLOWLY: reduce Na by ≤10 mEq/L per day to prevent cerebral edema from rapid water shift."}
];

let cur=0, answers=new Array(25).fill(null), marked=new Array(25).fill(false);
let timeLeft=1500, timerInt, submitted=false;

function init(){
  buildPalette(); renderQ(0); startTimer();
}

function startTimer(){
  timerInt=setInterval(()=>{
    if(submitted)return;
    timeLeft--;
    const el=document.getElementById('timer');
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    el.className='timer-val';
    if(timeLeft<=120) el.classList.add('timer-crit');
    else if(timeLeft<=300) el.classList.add('timer-warn');
    if(timeLeft<=0){ clearInterval(timerInt); submitTest(); }
  },1000);
}

function buildPalette(){
  const g=document.getElementById('palette'); g.innerHTML='';
  for(let i=0;i<25;i++){
    const b=document.createElement('button');
    b.className='pq pq-unattempted'; b.id=`pq${i}`; b.textContent=i+1;
    b.onclick=()=>goTo(i); g.appendChild(b);
  }
  refreshPalette();
}

function refreshPalette(){
  for(let i=0;i<25;i++){
    const b=document.getElementById(`pq${i}`);
    b.className='pq';
    if(i===cur) b.classList.add('pq-current');
    if(marked[i]) b.classList.add('pq-marked');
    else if(answers[i]!==null) b.classList.add('pq-answered');
    else b.classList.add('pq-unattempted');
  }
  const a=answers.filter(x=>x!==null).length, m=marked.filter(x=>x).length;
  document.getElementById('s-ans').textContent=a;
  document.getElementById('s-mrk').textContent=m;
  document.getElementById('s-un').textContent=25-a;
  document.getElementById('q-ans-count').textContent=a+' answered';
  document.getElementById('prog-bar').style.width=Math.max(4,Math.round((cur+1)/25*100))+'%';
}

function renderQ(i){
  const q=QUESTIONS[i];
  document.getElementById('qnum').textContent=`Q ${i+1}`;
  document.getElementById('q-prog').textContent=`Q ${i+1} / 25`;
  document.getElementById('q-text').textContent=q.q;
  const mb=document.getElementById('mark-badge'), bm=document.getElementById('btn-mark');
  mb.style.display=marked[i]?'inline':'none';
  bm.textContent=marked[i]?'⚑ Unmark':'⚑ Mark for Review';
  bm.className='btn btn-mark'+(marked[i]?' marked':'');
  const ol=document.getElementById('options'); ol.innerHTML='';
  q.opts.forEach((opt,oi)=>{
    const d=document.createElement('div');
    d.className='opt'+(answers[i]===oi?' selected':'');
    d.innerHTML=`<div class="opt-key">${String.fromCharCode(65+oi)}</div><div class="opt-text">${opt}</div>`;
    d.onclick=()=>selectAns(i,oi);
    ol.appendChild(d);
  });
  document.getElementById('btn-prev').disabled=i===0;
  document.getElementById('btn-next').textContent=i===24?'Save & Finish →':'Next →';
  refreshPalette();
}

function selectAns(qi,oi){
  if(submitted)return;
  answers[qi]=oi; renderQ(qi);
}

function toggleMark(){ marked[cur]=!marked[cur]; renderQ(cur); }
function clearAns(){ answers[cur]=null; renderQ(cur); }
function nav(d){ const n=cur+d; if(n>=0&&n<25){cur=n; renderQ(cur);} }
function goTo(i){ cur=i; renderQ(cur); }

function showModal(){
  const a=answers.filter(x=>x!==null).length, sk=25-a;
  document.getElementById('modal').style.display='block';
  document.getElementById('modal').innerHTML=`
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-icon">⚠️</div>
      <h3>Submit Test?</h3>
      <p>You have answered <strong>${a} out of 25</strong> questions.<br><strong>${sk} question(s)</strong> will be marked as skipped (0 marks).<br><br>This action cannot be undone.</p>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">← Resume Test</button>
        <button class="modal-confirm" onclick="submitTest()">Submit Now</button>
      </div>
    </div>
  </div>`;
}

function closeModal(){ document.getElementById('modal').style.display='none'; document.getElementById('modal').innerHTML=''; }

function submitTest(){
  submitted=true; clearInterval(timerInt);
  document.getElementById('modal').style.display='none';
  document.getElementById('modal').innerHTML='';
  document.getElementById('quiz-view').style.display='none';
  showResults();
}

function showResults(){
  const rv=document.getElementById('result-view'); rv.style.display='block';
  let correct=0,wrong=0,skipped=0;
  QUESTIONS.forEach((q,i)=>{ if(answers[i]===null) skipped++; else if(answers[i]===q.ans) correct++; else wrong++; });
  const score=correct-(wrong/3), maxScore=25, pct=Math.max(0,Math.round(score/maxScore*100));
  const timeTaken=1500-timeLeft, mm=Math.floor(timeTaken/60), ss=timeTaken%60;
  const grade=pct>=70?'🏆 Excellent':pct>=55?'👍 Good':pct>=40?'📈 Average':'📚 Needs Improvement';
  const circumference=2*Math.PI*54;
  const dash=Math.max(0,pct/100)*circumference;
  rv.innerHTML=`
  <div class="result-wrap">
    <div class="result-hero">
      <div class="result-hero-title">Test Submitted Successfully!</div>
      <div class="result-hero-sub">Internal Medicine — Fluid &amp; Electrolytes | 25 Questions | 25 Minutes</div>
      <div class="score-ring-wrap">
        <svg width="140" height="140" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="9"/>
          <circle cx="60" cy="60" r="54" fill="none" stroke="#fff" stroke-width="9" stroke-dasharray="${dash} ${circumference}" stroke-linecap="round" style="transition:stroke-dasharray 1.5s ease"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-ring-num">${score.toFixed(2)}</div>
          <div class="score-ring-denom">/ ${maxScore}</div>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat-val">${pct}%</div><div class="hero-stat-label">SCORE</div></div>
        <div class="hero-stat"><div class="hero-stat-val">${grade}</div><div class="hero-stat-label">PERFORMANCE</div></div>
        <div class="hero-stat"><div class="hero-stat-val">${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}</div><div class="hero-stat-label">TIME TAKEN</div></div>
      </div>
    </div>

    <div class="score-cards">
      <div class="sc sc-c animate-pop"><div class="sc-val">${correct}</div><div class="sc-label">✓ Correct (+${correct}.00)</div></div>
      <div class="sc sc-w animate-pop"><div class="sc-val">${wrong}</div><div class="sc-label">✗ Wrong (−${(wrong/3).toFixed(2)})</div></div>
      <div class="sc sc-s animate-pop"><div class="sc-val">${skipped}</div><div class="sc-label">— Skipped (0.00)</div></div>
      <div class="sc sc-n animate-pop"><div class="sc-val">${score.toFixed(2)}</div><div class="sc-label">Net Score</div></div>
    </div>

    <div class="perf-card">
      <div class="perf-title">Performance Breakdown</div>
      <div class="perf-row">
        <div class="perf-lbl">Correct</div>
        <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${(correct/25*100).toFixed(1)}%;background:#16a34a"></div></div>
        <div class="perf-count" style="color:#16a34a">${correct}</div>
      </div>
      <div class="perf-row">
        <div class="perf-lbl">Wrong</div>
        <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${(wrong/25*100).toFixed(1)}%;background:#dc2626"></div></div>
        <div class="perf-count" style="color:#dc2626">${wrong}</div>
      </div>
      <div class="perf-row">
        <div class="perf-lbl">Skipped</div>
        <div class="perf-bar-track"><div class="perf-bar-fill" style="width:${(skipped/25*100).toFixed(1)}%;background:#f59e0b"></div></div>
        <div class="perf-count" style="color:#f59e0b">${skipped}</div>
      </div>
    </div>

    <div class="review-hdr">Detailed Question Review</div>
    ${QUESTIONS.map((q,i)=>{
      const ua=answers[i];
      const isC=ua===q.ans, isS=ua===null, isW=!isS&&!isC;
      const dot=isC?'dot-c':isS?'dot-s':'dot-w';
      const badge=isC?'<span class="rq-badge badge-c">✓ Correct +1</span>':isS?'<span class="rq-badge badge-s">— Skipped 0</span>':'<span class="rq-badge badge-w">✗ Wrong −0.33</span>';
      const opts=q.opts.map((o,oi)=>{
        let cls='neutral';
        if(oi===q.ans) cls='correct';
        else if(oi===ua) cls='wrong';
        return `<div class="rq-opt ${cls}"><div class="rq-ok">${String.fromCharCode(65+oi)}</div><span>${o}</span></div>`;
      }).join('');
      const ya=ua===null?'Not attempted':`Your answer: <strong>${String.fromCharCode(65+ua)}</strong>`;
      return `
      <div class="rq">
        <div class="rq-hdr" onclick="toggleRev(${i})">
          <div class="rq-dot ${dot}"></div>
          <span class="rq-num">Q${i+1}</span>
          <span class="rq-qtxt">${q.q}</span>
          ${badge}
          <span class="rq-chev" id="chev${i}">&#8964;</span>
        </div>
        <div class="rq-body" id="rb${i}">
          <div class="rq-opts">${opts}</div>
          <div class="your-ans-line">${ya} &nbsp;|&nbsp; Correct answer: <strong>${String.fromCharCode(65+q.ans)}</strong></div>
          <div class="exp-box"><div class="exp-lbl">EXPLANATION</div><div class="exp-txt">${q.exp}</div></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function toggleRev(i){
  const b=document.getElementById(`rb${i}`), c=document.getElementById(`chev${i}`);
  const isOpen=b.classList.contains('show');
  b.classList.toggle('show',!isOpen);
  c.classList.toggle('open',!isOpen);
}

init();
</script>
</body>
</html>
